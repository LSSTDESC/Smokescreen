[runtime]
verbosity = standard
root = ${PWD}
sampler = nautilus

[DEFAULT]
project_dir = ${PWD}/../../

[output]
format = text
verbosity = 1
filename = output_blind_B/lsst_y1_3x2pt.txt

[test]
save_dir=output_blindB/lsst_y1_3x2pt
fatal_errors=T

[nautilus]
n_live = 150
n_networks = 6
n_batch = 75
verbose = True
f_live = 0.02
n_eff = 1000
discard_exploration = True
resume = True

[consistency]
file = ${COSMOSIS_STD_LIB_DIR}/utility/consistency/consistency_interface.py

[pipeline]
modules = consistency camb firecrown_likelihood
likelihoods = firecrown
timing = F
debug = F
values = cosmosis_values.ini
priors = cosmosis_priors.ini
extra_output=cosmological_parameters/omega_m cosmological_parameters/S8 cosmological_parameters/sigma_8

[camb]
file = ${COSMOSIS_STD_LIB_DIR}/boltzmann/camb/camb_interface.py
mode = all
accurate_massive_neutrino_transfers = True
use_ppf_w = True
nonlinear = 'pk'
halofit_version = mead2020_feedback
zmin = 0.0
zmax = 3.5
nz = 256
kmax = 5.0
nk = 300
neutrino_hierarchy = degenerate

[firecrown_likelihood]
file = ${FIRECROWN_DIR}/firecrown/connector/cosmosis/likelihood.py
require_nonlinear_pk = True
sampling_parameters_sections = firecrown_two_point
likelihood_source =  %(project_dir)s/examples/lsst_y1_3x2pt/3x2pt_likelihood.py
sacc_data = %(project_dir)s/examples/lsst_y1_3x2pt/sacc_forecasting_y1_3x2pt_blind_B.fits
